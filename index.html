<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBF Mentor Panel</title>
    <style>
        :root {
            --primary: #0056d2;
            --primary-light: rgba(0,86,210,0.1);
            --radius: 12px;
            --radius-sm: 8px;
            --border: #e0e0e0;
            --surface2: #f5f5f5;
            --text: #333333;
            --text2: #666666;
            --text3: #999999;
            --success: #2e7d32;
            --danger: #c62828;
        }
        /* Твои стили интерфейса (сетка, карточки, шрифты) */
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #fafafa; color: var(--text); }
        .page-header { margin-bottom: 24px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .badge-blue { background: #e3f2fd; color: #0d47a1; }
        .badge-orange { background: #fff3e0; color: #e65100; }
        .badge-green { background: #e8f5e9; color: #1b5a20; }
        .badge-gray { background: #eee; color: #666; }
        .group-card { padding: 16px; background: white; border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer; margin-bottom: 12px; }
        .group-card.selected { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }
        .attendance-cell { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .att-present { background: #e8f5e9; color: var(--success); }
        .att-absent { background: #ffebee; color: var(--danger); }
        .att-none { background: var(--surface2); color: var(--text3); }
    </style>
</head>

    <script>
    // ===== SUPABASE INITIALIZATION =====
    const SUPABASE_URL = 'https://uiaedsclzbtsqylihrfs.supabase.co/rest/v1/'; // ВСТАВЬ СВОЙ URL СЮДА
    const SUPABASE_ANON_KEY = 'sb_publishable_bQtUajpAAvoU1T2bUG9U-g_4UOss56u'; // ВСТАВЬ СВОЙ АНОН-КЛЮЧ СЮДА
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Глобальное состояние приложения
    const DB = {
        calYear: new Date().getFullYear(),
        calMonth: new Date().getMonth(),
        events: [],
        tests: [],
        testResults: [],
        englishGroups: {},
        students: [],
        attendance: {},
        currentRole: 'mentor',
        currentUser: null,
        selectedGroup: null,
        attWeekOffset: 0,
        activeTest: null,
        uploadedFile: null
    };

    const SUBJECT_COLORS = { 'Информатика': 'badge-blue', 'Ағылшын тілі': 'badge-orange' };
    const PILLAR_COLORS = ['pillar-1', 'pillar-2', 'pillar-3', 'pillar-4'];
    const GROUP_COLORS = { 'Beginner': '#4caf50', 'Elementary': '#2196f3', 'Pre-Intermediate': '#ff9800', 'Intermediate': '#e91e63', 'IELTS': '#9c27b0' };

    // Утилиты уведомлений и навигации
    function showNotif(msg, type = 'success') { alert(`[${type.toUpperCase()}] ${msg}`); }
    function switchPage(page) { console.log(`Навигация: ${page}`); }
    function updateStats() { console.log('Статистика обновлена'); }
    function avatarColor(name) { return '#0056d2'; }
    function getInitials(name) { return name.split(' ').map(n => n[0]).join(''); }
    function initApp() { console.log('Интерфейс инициализирован'); }
    function selectRole(role) { DB.currentRole = role; }
   function initApp() { console.log('Интерфейс инициализирован'); }
function selectRole(role) { DB.currentRole = role; }

// ===== REAL SUPABASE DATA LOADERS =====
async function loadMentorData() {
  try {
    const { data: students, error: sErr } = await supabase.from('students').select('*').order('lastName', { ascending: true });
    if (sErr) throw sErr;
    DB.students = students || [];

    GROUP_ORDER.forEach(g => {
      if (!DB.englishGroups[g]) { DB.englishGroups[g] = { teacher: 'Тағайындалмаған', schedule: '—', students: [] }; }
      DB.englishGroups[g].students = DB.students.filter(s => s.english_group === g).map(s => `${s.firstName} ${s.lastName}`);
    });

    const { data: events, error: eErr } = await supabase.from('events').select('*').order('event_date', { ascending: true });
    if (eErr) throw eErr;
    DB.events = (events || []).map(e => ({ id: e.id, title: e.title, date: e.event_date, time: e.event_time, pillar: e.pillar, location: e.location, desc: e.description, participants: e.participants || [] }));

    const { data: tests, error: tErr } = await supabase.from('tests').select('*');
    if (tErr) throw tErr;
    DB.tests = tests || [];

    const { data: attendance, error: aErr } = await supabase.from('attendance').select('*');
    if (aErr) throw aErr;
    DB.attendance = {};
    (attendance || []).forEach(row => { const key = `${row.group_name}:${row.student_name}:${row.lesson_date}`; DB.attendance[key] = row.status; });

    console.log('Данные ментора успешно синхронизированы с Supabase!');
  } catch (err) { showNotif('Данные загрузить не удалось: ' + err.message, 'error'); }
}

async function loadStudentData() {
  if (!DB.currentUser) return;
  try {
    const studentId = DB.currentUser.student_id;
    const { data: events, error: eErr } = await supabase.from('events').select('*').order('event_date', { ascending: true });
    if (eErr) throw eErr;
    DB.events = (events || []).map(e => ({ id: e.id, title: e.title, date: e.event_date, time: e.event_time, pillar: e.pillar, location: e.location, desc: e.description, participants: e.participants || [] }));

    const { data: tests, error: tErr } = await supabase.from('tests').select('*');
    if (tErr) throw tErr;
    DB.tests = tests || [];

    const { data: results, error: rErr } = await supabase.from('test_results').select('*').eq('student_id', studentId);
    if (rErr) throw rErr;
    DB.testResults = (results || []).map(r => ({ testId: r.test_id, studentId: r.student_id, score: r.score, correct: r.correct, total: r.total }));

    console.log('Данные студента успешно синхронизированы с Supabase!');
  } catch (err) { showNotif('Қате: Студент деректерін жүктеу мүмкін болмады: ' + err.message, 'error'); }
}
// ======================================

function renderTestsLibrary() { console.log('Библиотека тестов обновлена'); }

    // ===== FILE MANAGEMENT =====
    function formatFileLabel(file) {
      return `📎 ${file.name} <span style="font-size:12px;color:var(--text2);font-weight:400;">(${(file.size/1024).toFixed(1)} KB)</span>`;
    }

    // ===== AI TEST GENERATOR =====
    async function generateTestWithAI() {
      const subject = document.getElementById('testSubject').value;
      const title = document.getElementById('testTitle').value.trim();
      if(!subject || !title || !DB.uploadedFile) { 
        showNotif('Барлық өрістерді толтырыңыз және файл жүктеңіз!', 'error'); 
        return; 
      }

      document.getElementById('generateBtn').style.display = 'none';
      document.getElementById('aiLoader').style.display = 'block';
      document.getElementById('generatedTestPreview').style.display = 'none';

      const demoQuestions = [
        { q:`${subject} бойынша бірінші негізгі сұрақ?`, options:['А нұсқасы','Б нұсқасы','С нұсқасы','Д нұсқасы'], correct:0 },
        { q:`${subject} саласындағы ең маңызды ұғым?`, options:['Заң','Теорема','Формула','Принцип'], correct:1 },
        { q:`${subject} тақырыбы бойынша тест сұрағы №3`, options:['Жауап А','Жауап Б','Жауап С','Жауап Д'], correct:2 }
      ];

      const { data, error } = await supabase.from('tests').insert([{ title, subject, questions: demoQuestions }]).select().single();

      document.getElementById('aiLoader').style.display = 'none';
      document.getElementById('generateBtn').style.display = 'block';

      if (error) { 
        showNotif('Сақтау қатесі: ' + error.message, 'error'); 
        return; 
      }

      await loadMentorData(); 
      showPreviewTest(data);
      showNotif(`"${title}" тесті жасалып, Supabase-ке сақталды!`);
    }

    function showPreviewTest(test) {
      const el = document.getElementById('generatedTestPreview'); 
      if(!el) return;
      el.style.display = 'block';
      el.innerHTML = `
        <div style="margin-top:20px; padding:20px; background:var(--primary-light); border-radius:var(--radius); border:1px solid rgba(0,86,210,0.2);">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <div><b style="font-size:16px;">${test.title}</b> — <span class="badge ${SUBJECT_COLORS[test.subject]||'badge-gray'}">${test.subject}</span></div>
            <span class="badge badge-green">✓ ${test.questions ? test.questions.length : 0} сұрақ</span>
          </div>
          ${test.questions ? test.questions.map((q,i)=>`
            <div style="padding:12px;background:white;border-radius:8px;margin-bottom:8px;border:1px solid var(--border);">
              <div style="font-size:13px;color:var(--text3);font-weight:700;margin-bottom:4px;">Сұрақ ${i+1}</div>
              <div style="font-size:14px;font-weight:600;">${q.q}</div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:8px;">
                ${q.options.map((o,oi)=>`<div style="font-size:12px;padding:4px 8px;background:${oi===q.correct?'rgba(46,125,50,0.1)':'var(--surface2)'};border-radius:4px;color:${oi===q.correct?'var(--success)':'var(--text2)'};font-weight:${oi===q.correct?'700':'400'};">${['A','B','C','D'][oi]}. ${o}${oi===q.correct?' ✓':''}</div>`).join('')}
              </div>
            </div>
          `).join('') : ''}
        </div>`;
    }

    function previewTestMentor(id) {
      const t = DB.tests.find(tt=>tt.id===id); 
      if(t) showPreviewTest(t);
      switchPage('tests-mentor');
    }

    // ===== CALENDAR =====
    function renderCalendar() {
      const months = ['Қаңтар','Ақпан','Наурыз','Сәуір','Мамыр','Маусым','Шілде','Тамыз','Қыркүйек','Қазан','Қараша','Желтоқсан'];
      const y = DB.calYear, m = DB.calMonth;
      document.getElementById('calMonthLabel').textContent = months[m] + ' ' + y;
      const firstDay = new Date(y, m, 1).getDay();
      const offset = (firstDay + 6) % 7;
      const daysInMonth = new Date(y, m+1, 0).getDate();
      const daysInPrev = new Date(y, m, 0).getDate();

      let html = '';
      for(let i=offset-1; i>=0; i--) html += `<div class="cal-day other-month"><div class="cal-day-num">${daysInPrev-i}</div></div>`;
      
      for(let d=1; d<=daysInMonth; d++) {
        const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday = new Date().getFullYear()===y && new Date().getMonth()===m && new Date().getDate()===d;
        const dayEvents = DB.events.filter(e=>e.date===dateStr);
        html += `<div class="cal-day${isToday?' today':''}">
          <div class="cal-day-num">${d}</div>
          ${dayEvents.map(e=>`<div class="cal-event ${PILLAR_COLORS[e.pillar]}" onclick="showEventDetail(${e.id})">${e.title}</div>`).join('')}
        </div>`;
      }
      const remaining = (7 - ((offset + daysInMonth) % 7)) % 7;
      for(let d=1; d<=remaining; d++) html += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
      document.getElementById('calendarDays').innerHTML = html;
      renderEventsList();
    }

    function renderEventsList() {
      const el = document.getElementById('eventsList'); 
      if(!el) return;
      if(DB.events.length === 0) { 
        el.innerHTML = '<p style="color:var(--text3);">Іс-шаралар жоқ</p>'; 
        return; 
      }
      el.innerHTML = DB.events.sort((a,b)=>a.date.localeCompare(b.date)).map(e=>`
        <div style="display:flex;align-items:flex-start;gap:16px;padding:14px;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:8px;background:var(--surface2);">
          <div style="text-align:center;min-width:44px;background:var(--primary-light);border-radius:10px;padding:8px;">
            <div style="font-size:18px;font-weight:800;color:var(--primary);font-family:var(--font2);">${e.date.split('-')[2]}</div>
            <div style="font-size:10px;color:var(--text3);">${e.date.split('-')[1]}</div>
          </div>
          <div style="flex:1;">
            <div style="font-weight:700;font-size:14px;">${e.title}</div>
            <div style="font-size:12px;color:var(--text2);margin-top:2px;">${e.time} • ${e.location}</div>
            <div style="font-size:12px;color:var(--text3);margin-top:4px;">${e.desc}</div>
            <div style="margin-top:6px;font-size:12px;color:var(--text2);">
              <span class="badge badge-gray">${e.participants ? e.participants.length : 0} қатысушы</span>
            </div>
          </div>
          ${DB.currentRole==='mentor' ? `<button class="btn btn-danger btn-sm btn-icon" onclick="deleteEvent(${e.id})">🗑</button>` : 
            DB.currentRole==='student' ? `<button class="btn ${e.participants.includes(DB.currentUser?.id)?'btn-secondary':'btn-primary'} btn-sm" onclick="toggleEventParticipation(${e.id})">${e.participants.includes(DB.currentUser?.id)?'✓ Тіркелдім':'Қатысамын'}</button>` : ''}
        </div>
      `).join('');
    }

    function prevMonth() { if(DB.calMonth===0){DB.calMonth=11;DB.calYear--;}else DB.calMonth--; renderCalendar(); }
    function nextMonth() { if(DB.calMonth===11){DB.calMonth=0;DB.calYear++;}else DB.calMonth++; renderCalendar(); }

    async function addEvent() {
      const title = document.getElementById('evTitle').value.trim();
      const date = document.getElementById('evDate').value;
      if(!title||!date) { showNotif('Іс-шара атауы мен күнін енгізіңіз!','error'); return; }

      const time = document.getElementById('evTime').value||'—';
      const pillar = parseInt(document.getElementById('evPillar').value);
      const location = document.getElementById('evLocation').value||'—';
      const desc = document.getElementById('evDesc').value;

      const { error } = await supabase.from('events').insert([
        { title, event_date: date, event_time: time, pillar, location, description: desc, participants: [] }
      ]);

      if (error) { showNotif('Қате: ' + error.message, 'error'); return; }

      await loadMentorData(); 
      closeModal('addEventModal'); 
      renderCalendar(); 
      updateStats();
      showNotif('Іс-шара қосылды!');
      ['evTitle','evDate','evTime','evLocation','evDesc'].forEach(id=>document.getElementById(id).value='');
    }

    async function deleteEvent(id) {
      if(!confirm('Іс-шараны жоясыз ба?')) return;
      const { error } = await supabase.from('events').delete().eq('id', id);
      if (error) { showNotif('Қате: ' + error.message, 'error'); return; }
      await loadMentorData(); renderCalendar(); updateStats();
      showNotif('Іс-шара жойылды','error');
    }

    function showEventDetail(id) {
      const e = DB.events.find(ev=>ev.id===id); 
      if(e) showNotif(`${e.title} — ${e.date} ${e.time}`, 'info');
    }

    // ===== ENGLISH & ATTENDANCE =====
    const GROUP_ORDER = ['Beginner','Elementary','Pre-Intermediate','Intermediate','IELTS'];

    function renderEnglish() {
      const grid = document.getElementById('englishGroupsGrid'); 
      if(!grid) return;
      grid.innerHTML = GROUP_ORDER.map(g => {
        const grp = DB.englishGroups[g] || { teacher: 'Тағайындалмаған', schedule: '—', students: [] };
        const color = GROUP_COLORS[g];
        return `<div class="group-card${DB.selectedGroup===g?' selected':''}" onclick="selectGroup('${g}')">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div>
              <div class="group-level" style="color:${color};">${g}</div>
              <div class="group-name">${grp.teacher}</div>
            </div>
            <div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;background:${color}20;color:${color};">${grp.students.length}</div>
          </div>
          <div style="margin-top:12px; font-size:12px; color:var(--text3);">${grp.schedule}</div>
        </div>`;
      }).join('');
      if(DB.selectedGroup) renderAttendance();
    }

    function selectGroup(g) { 
      DB.selectedGroup = g; 
      document.getElementById('groupDetail').style.display = 'block'; 
      renderAttendance(); 
    }

    function renderAttendance() {
      const g = DB.selectedGroup; if(!g) return;
      const grp = DB.englishGroups[g] || { teacher: '—', schedule: '—', students: [] };
      document.getElementById('groupDetailTitle').textContent = g + ' тобы';
      document.getElementById('groupDetailSub').textContent = grp.teacher + ' • ' + grp.schedule;

      const todayDate = new Date(); const dayOfWeek = todayDate.getDay();
      const monday = new Date(todayDate); monday.setDate(todayDate.getDate() - ((dayOfWeek+6)%7) + (DB.attWeekOffset*7));

      const weekDays = []; for(let i=0; i<6; i++) { const d = new Date(monday); d.setDate(monday.getDate()+i); weekDays.push(d); }
      const dayNames = ['ДС','СЕ','СР','БЕ','ЖМ','СБ']; const students = grp.students;

      let html = `<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;min-width:500px;"><thead><tr><th style="text-align:left;padding:10px 12px;color:var(--text3);">Студент</th>`;
      html += weekDays.map((d,i)=>`<th style="text-align:center;padding:10px 8px;color:var(--text3);"><div>${dayNames[i]}</div><div style="font-size:13px;font-weight:800;color:var(--text);">${d.getDate()}</div></th>`).join('');
      html += `<th style="text-align:center;padding:10px;color:var(--text3);">%</th></tr></thead><tbody>`;

      if(students.length === 0) { 
        html += `<tr><td colspan="${weekDays.length+2}" style="padding:20px;text-align:center;color:var(--text3);">Топта студент жоқ</td></tr>`; 
      } else {
        students.forEach(sName => {
          const presents = weekDays.filter(d => DB.attendance[`${g}:${sName}:${d.toISOString().split('T')[0]}`] === 'P').length;
          const pct = Math.round((presents/weekDays.length)*100); const color = avatarColor(sName);
          html += `<tr><td style="padding:10px 12px;border-top:1px solid var(--border);"><div style="display:flex;align-items:center;gap:8px;"><div class="avatar" style="width:28px;height:28px;border-radius:8px;font-size:11px;background:${color}1A;color:${color};">${getInitials(sName)}</div><span style="font-size:13px;font-weight:600;">${sName}</span></div></td>`;
          weekDays.forEach(d => {
            const dateStr = d.toISOString().split('T')[0]; const key = `${g}:${sName}:${dateStr}`; const val = DB.attendance[key];
            html += `<td style="text-align:center;padding:6px;border-top:1px solid var(--border);"><div class="attendance-cell ${val==='P'?'att-present':val==='A'?'att-absent':'att-none'}" onclick="toggleAtt('${g}','${sName}','${dateStr}')">${val==='P'?'✓':val==='A'?'✗':'·'}</div></td>`;
          });
          html += `<td style="text-align:center;padding:6px 12px;border-top:1px solid var(--border);"><div style="font-weight:700;color:${pct>70?'var(--success)':'var(--danger)'};">${pct}%</div></td></tr>`;
        });
      }
      html += `</tbody></table></div>`;
      document.getElementById('attendanceTable').innerHTML = html;
    }

    async function toggleAtt(group, student, date) {
      const key = `${group}:${student}:${date}`; const cur = DB.attendance[key];
      const nextVal = cur==='P'?'A':cur==='A'?null:'P';
      
      if (nextVal === null) {
        await supabase.from('attendance').delete().eq('group_name', group).eq('student_name', student).eq('lesson_date', date);
        delete DB.attendance[key];
      } else {
        await supabase.from('attendance').upsert({ group_name: group, student_name: student, lesson_date: date, status: nextVal });
        DB.attendance[key] = nextVal;
      }
      renderAttendance();
    }

    function prevAttWeek() { DB.attWeekOffset--; renderAttendance(); }
    function nextAttWeek() { DB.attWeekOffset++; renderAttendance(); }
    function saveAttendance() { showNotif('Қатысымдылық автоматты түрде сақталды!'); }

    async function addStudentToGroup() {
      const sel = document.getElementById('groupStudentSelect').value;
      const grp = document.getElementById('groupSelect').value;
      if(!sel) return;

      const s = DB.students.find(st=>(st.firstName+' '+st.lastName)===sel);
      if(s) {
        const { error } = await supabase.from('students').update({ english_group: grp }).eq('id', s.id);
        if(!error) { 
          showNotif(`${sel} — ${grp} тобына қосылды!`); 
          await loadMentorData(); 
          renderEnglish(); 
          closeModal('addGroupStudentModal'); 
        }
      }
    }

    async function removeFromGroup(group, studentName) {
      const s = DB.students.find(st=>(st.firstName+' '+st.lastName)===studentName);
      if(s) {
        const { error } = await supabase.from('students').update({ english_group: '' }).eq('id', s.id);
        if(!error) { showNotif(`${studentName} топтан шығарылды`, 'error'); await loadMentorData(); renderEnglish(); }
      }
    }

    // ===== STUDENT TESTS =====
    function renderMyTests() {
      const mySubject = DB.currentUser?.subject;
      const available = DB.tests.filter(t => !mySubject || t.subject === mySubject || t.subject === 'Ағылшын тілі');
      const el = document.getElementById('availableTestsList');
      if(el) el.innerHTML = available.length === 0 ? '<div style="padding:40px;text-align:center;color:var(--text3);">Берілген тест жоқ</div>' :
        available.map(t => {
          const myResult = DB.testResults.find(r=>r.testId===t.id && r.studentId===DB.currentUser?.student_id);
          return `<div class="section-card" style="margin-bottom:16px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div>
                <div style="font-size:16px;font-weight:700;">${t.title}</div>
                <div style="margin-top:6px;display:flex;gap:8px;"><span class="badge ${SUBJECT_COLORS[t.subject]||'badge-gray'}">${t.subject}</span></div>
              </div>
              <div>${myResult ? `<b>${myResult.score}%</b>` : `<button class="btn btn-primary" onclick="startTest(${t.id})">Өту →</button>`}</div>
            </div>
          </div>`;
        }).join('');
    }

    function startTest(testId) {
      const test = DB.tests.find(t=>t.id===testId);
      DB.activeTest = { testId, questions: [...test.questions], current: 0, answers: {} };
      switchPage('take-test'); renderQuestion();
    }

    function renderQuestion() {
      const {testId, questions, current, answers} = DB.activeTest;
      const test = DB.tests.find(t=>t.id===testId); const q = questions[current];
      const total = questions.length;
      const container = document.getElementById('testContainer');
      if(!container) return;
      container.innerHTML = `
        <div class="page-header"><h2>${test.title}</h2></div>
        <div class="quiz-question-card">
          <div class="quiz-q-text">${q.q}</div>
          <div class="quiz-options">
            ${q.options.map((o,i)=>`<div class="quiz-option${answers[current]===i?' selected':''}" onclick="selectAnswer(${i})">${o}</div>`).join('')}
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:20px;">
          <button class="btn btn-secondary" onclick="prevQuestion()">Артқа</button>
          <button class="btn btn-primary" onclick="${current<total-1?'nextQuestion()':'finishTest()'}">${current<total-1?'Келесі':'Аяқтау'}</button>
        </div>`;
    }

    function selectAnswer(i) { DB.activeTest.answers[DB.activeTest.current] = i; renderQuestion(); }
    function nextQuestion() { DB.activeTest.current++; renderQuestion(); }
    function prevQuestion() { if(DB.activeTest.current > 0) { DB.activeTest.current--; renderQuestion(); } }

    async function finishTest() {
      const {testId, questions, answers} = DB.activeTest;
      let correct = 0; questions.forEach((q,i) => { if(answers[i]===q.correct) correct++; });
      const score = Math.round((correct/questions.length)*100);

      await supabase.from('test_results').insert([
        { test_id: testId, student_id: DB.currentUser?.student_id, score, correct, total: questions.length }
      ]);

      await loadStudentData(); switchPage('my-tests');
      showNotif(`Тест аяқталды! Нәтижеңіз: ${score}%`);
    }

    // ===== STUDENT EVENTS =====
    function renderStudentEvents() {
      const el = document.getElementById('studentEventsList'); if(!el) return;
      el.innerHTML = DB.events.map(e => {
        const joined = e.participants.includes(DB.currentUser?.id);
        return `<div class="section-card" style="margin-bottom:16px;">
          <div><b>${e.title}</b> - ${e.date}</div>
          <button class="btn btn-sm ${joined?'btn-secondary':'btn-primary'}" onclick="toggleEventParticipation(${e.id})">
            ${joined?'Бас тарту':'Қатысамын'}
          </button>
        </div>`;
      }).join('');
    }

    async function toggleEventParticipation(eventId) {
      const e = DB.events.find(ev=>ev.id===eventId); if(!e || !DB.currentUser) return;
      let updatedParticipants = [...e.participants];
      const idx = updatedParticipants.indexOf(DB.currentUser.id);
      
      if(idx >= 0) updatedParticipants.splice(idx, 1);
      else updatedParticipants.push(DB.currentUser.id);

      await supabase.from('events').update({ participants: updatedParticipants }).eq('id', eventId);
      if (DB.currentRole === 'mentor') await loadMentorData(); else await loadStudentData();
      renderStudentEvents(); renderEventsList();
    }

    // ===== PROGRESS, MODAL & TABS =====
    function renderProgress() {
      const results = DB.testResults.filter(r=>r.studentId===DB.currentUser?.student_id);
      const avg = results.length ? Math.round(results.reduce((a,b)=>a+b.score,0)/results.length) : 0;
      document.getElementById('progressContent').innerHTML = `<div class="stat-card"><h3>Орташа нәтиже: ${avg}%</h3></div>`;
    }

    function openModal(id) {
      if(id === 'addGroupStudentModal') {
        document.getElementById('groupStudentSelect').innerHTML = DB.students.map(s=>`<option>${s.firstName} ${s.lastName}</option>`).join('');
      }
      document.getElementById(id).classList.add('open');
    }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function switchTab(el, prefix) {
      const tabs = el.parentElement.querySelectorAll('.tab'); const idx = Array.from(tabs).indexOf(el);
      tabs.forEach(t=>t.classList.remove('active')); el.classList.add('active');
      if(prefix==='testsTab') renderTestsLibrary();
    }

    function exportStudents() {
      const rows = [['Аты','Тегі','Санат','Пән']]; DB.students.forEach(s=>rows.push([s.firstName,s.lastName,s.category,s.subject]));
      const csv = rows.map(r=>r.join(',')).join('\n');
      const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download='students.csv'; a.click();
    }

    // Автопроверка сессии при загрузке страницы
    window.addEventListener('DOMContentLoaded', async () => {
      selectRole('mentor');
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
        if (profile) {
          DB.currentRole = profile.role; DB.currentUser = profile;
          if (DB.currentRole === 'mentor') await loadMentorData();
          else if (DB.currentRole === 'student') await loadStudentData();
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('app').style.display = 'block'; initApp();
        }
      }
    });
    </script>
</body>
</html>
